<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | ROMILA</title>
  <link rel="icon" type="image/png" href="logo2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    :root { --bg: #0c0a09; --surface: #141210; --border: #1c1917; --accent: #e7e5e4; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--accent); -webkit-font-smoothing: antialiased; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .status-badge { display: inline-block; padding: 2px 10px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; }
    .status-placed    { background: #1c1917; color: #a8a29e; border: 1px solid #292524; }
    .status-dispatched{ background: #1c1405; color: #fbbf24; border: 1px solid #292524; }
    .status-delivered { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    select { background-color: #1c1917; border: 1px solid #292524; color: #e7e5e4; }
    input[type=text], input[type=password], input[type=email] { background-color: #141210; border: 1px solid #1c1917; color: #e7e5e4; }
    input:focus, select:focus { outline: none; border-color: #57534e; }
    .order-row:hover { background: #141210; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <div class="text-center mb-12">
        <img src="logo6.png" alt="Romila" class="h-14 mx-auto mb-6 object-contain">
        <span class="text-[9px] uppercase tracking-[0.5em] text-stone-600">Admin Panel</span>
      </div>
      <div class="border border-stone-900 bg-[#0a0908] p-10">
        <div class="mb-5">
          <label class="text-[9px] uppercase tracking-widest text-stone-500 mb-2 block">Email</label>
          <input id="login-email" type="email" placeholder="admin@email.com" class="w-full px-4 py-3 text-sm">
        </div>
        <div class="mb-8">
          <label class="text-[9px] uppercase tracking-widest text-stone-500 mb-2 block">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" class="w-full px-4 py-3 text-sm">
        </div>
        <div id="login-error" class="hidden text-red-400 text-xs mb-4 border border-red-900 bg-red-950/30 px-4 py-3"></div>
        <button onclick="adminLogin()"
          class="w-full py-4 bg-white text-black text-[9px] uppercase tracking-[0.4em] font-bold hover:bg-stone-200 transition-all flex items-center justify-center gap-2">
          <span id="login-text">Sign In</span>
          <span id="login-spinner" class="hidden"><svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-dashboard" class="hidden min-h-screen">

    <!-- Top Bar -->
    <nav class="sticky top-0 z-40 bg-[#0a0908] border-b border-stone-900 px-6 md:px-10 py-4 flex justify-between items-center">
      <div class="flex items-center gap-6">
        <img src="logo6.png" alt="Romila" class="h-10 object-contain">
        <span class="text-[9px] uppercase tracking-[0.4em] text-stone-600 hidden md:block">Order Management</span>
      </div>
      <div class="flex items-center gap-6">
        <div class="flex gap-4 text-[9px] uppercase tracking-widest">
          <span class="text-stone-600">Total: <span id="stat-total" class="text-white">0</span></span>
          <span class="text-stone-600">Pending: <span id="stat-pending" class="text-yellow-500">0</span></span>
          <span class="text-stone-600">Delivered: <span id="stat-delivered" class="text-green-500">0</span></span>
        </div>
        <button onclick="adminLogout()" class="text-[9px] uppercase tracking-widest text-stone-500 hover:text-white transition-colors">Logout</button>
      </div>
    </nav>

    <div class="px-6 md:px-10 py-8">

      <!-- Filter + Search -->
      <div class="flex flex-col md:flex-row gap-4 mb-8">
        <input id="search-input" type="text" placeholder="Search by name, phone, order ID..."
          oninput="filterOrders()"
          class="flex-1 px-4 py-3 text-sm placeholder-stone-600">
        <select id="filter-status" onchange="filterOrders()" class="px-4 py-3 text-sm">
          <option value="">All Statuses</option>
          <option value="Order Placed">Order Placed</option>
          <option value="Dispatched">Dispatched</option>
          <option value="Delivered">Delivered</option>
        </select>
        <button onclick="loadOrders()" class="px-6 py-3 border border-stone-800 text-[9px] uppercase tracking-widest text-stone-400 hover:text-white hover:border-stone-600 transition-all">
          Refresh
        </button>
      </div>

      <!-- Loading -->
      <div id="orders-loading" class="text-center py-20 text-stone-600 text-sm">Loading orders...</div>

      <!-- Orders Table -->
      <div id="orders-container" class="hidden">
        <div id="no-orders" class="hidden text-center py-20 text-stone-600 text-sm italic font-serif">No orders found.</div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="border-b border-stone-900 text-[9px] uppercase tracking-widest text-stone-600">
                <th class="text-left py-4 pr-6 font-normal">Order ID</th>
                <th class="text-left py-4 pr-6 font-normal">Date</th>
                <th class="text-left py-4 pr-6 font-normal">Customer</th>
                <th class="text-left py-4 pr-6 font-normal">Product</th>
                <th class="text-left py-4 pr-6 font-normal">Qty</th>
                <th class="text-left py-4 pr-6 font-normal">Status</th>
                <th class="text-left py-4 pr-6 font-normal">Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeDetail()"></div>
    <div class="relative bg-[#0c0a09] border border-stone-800 w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8">
      <div class="flex justify-between items-start mb-8">
        <div>
          <span class="text-[9px] uppercase tracking-[0.4em] text-stone-600 block mb-1">Order Details</span>
          <h3 id="detail-order-id" class="text-2xl font-serif italic text-white"></h3>
        </div>
        <button onclick="closeDetail()" class="text-stone-500 hover:text-white text-2xl transition-colors">&times;</button>
      </div>
      <div id="detail-content" class="space-y-6 text-sm"></div>
    </div>
  </div>

  <script>
    // ── FIREBASE CONFIG ── Replace with your own values
   const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBquB0qLjBU9tkmpFqs8l5C3X93gS3Q2vQ",
  authDomain:        "romila-shop.firebaseapp.com",
  projectId:         "romila-shop",
  storageBucket:     "romila-shop.firebasestorage.app",
  messagingSenderId: "251855825998",
  appId:             "1:251855825998:web:9974a35f179fd5324d271f"
};

    firebase.initializeApp(FIREBASE_CONFIG);
    const db   = firebase.firestore();
    const auth = firebase.auth();

    let allOrders = [];

    // ── AUTH ─────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
        loadOrders();
      }
    });

    async function adminLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      errEl.classList.add('hidden');

      if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.classList.remove('hidden'); return; }

      document.getElementById('login-text').textContent = 'Signing in...';
      document.getElementById('login-spinner').classList.remove('hidden');

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch(e) {
        errEl.textContent = 'Invalid credentials. Please try again.';
        errEl.classList.remove('hidden');
        document.getElementById('login-text').textContent = 'Sign In';
        document.getElementById('login-spinner').classList.add('hidden');
      }
    }

    function adminLogout() {
      auth.signOut().then(() => {
        document.getElementById('admin-dashboard').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
      });
    }

    // ── LOAD ORDERS ──────────────────────────────────────────
    async function loadOrders() {
      document.getElementById('orders-loading').classList.remove('hidden');
      document.getElementById('orders-container').classList.add('hidden');

      try {
        const snap = await db.collection('orders').orderBy('createdAt', 'desc').get();
        allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateStats();
        renderOrders(allOrders);
      } catch(e) {
        console.error(e);
        document.getElementById('orders-loading').textContent = 'Error loading orders. Check your Firebase config.';
      }
    }

    function updateStats() {
      document.getElementById('stat-total').textContent     = allOrders.length;
      document.getElementById('stat-pending').textContent   = allOrders.filter(o => o.status !== 'Delivered').length;
      document.getElementById('stat-delivered').textContent = allOrders.filter(o => o.status === 'Delivered').length;
    }

    function renderOrders(orders) {
      document.getElementById('orders-loading').classList.add('hidden');
      document.getElementById('orders-container').classList.remove('hidden');

      const tbody = document.getElementById('orders-table-body');
      if (!orders.length) {
        document.getElementById('no-orders').classList.remove('hidden');
        tbody.innerHTML = '';
        return;
      }
      document.getElementById('no-orders').classList.add('hidden');

      tbody.innerHTML = orders.map(o => {
        const date   = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
        const badge  = statusBadge(o.status);
        return `
          <tr class="order-row border-b border-stone-900/50 transition-colors">
            <td class="py-4 pr-6 font-mono text-xs text-stone-500">${o.orderId || o.id}</td>
            <td class="py-4 pr-6 text-xs text-stone-500">${date}</td>
            <td class="py-4 pr-6">
              <div class="text-stone-200 font-medium">${o.name}</div>
              <div class="text-stone-600 text-xs">${o.phone}</div>
            </td>
            <td class="py-4 pr-6">
              <div class="text-stone-300">${o.product}</div>
              <div class="text-stone-600 text-xs">Qty: ${o.quantity}</div>
            </td>
            <td class="py-4 pr-6 text-stone-400 text-xs">${o.quantity}</td>
            <td class="py-4 pr-6">${badge}</td>
            <td class="py-4 pr-6">
              <div class="flex gap-2">
                <select onchange="updateStatus('${o.orderId || o.id}', this.value)"
                  class="text-[10px] px-2 py-1 uppercase tracking-wider">
                  <option value="Order Placed"  ${o.status==='Order Placed'  ?'selected':''}>Order Placed</option>
                  <option value="Dispatched"    ${o.status==='Dispatched'    ?'selected':''}>Dispatched</option>
                  <option value="Delivered"     ${o.status==='Delivered'     ?'selected':''}>Delivered</option>
                </select>
                <button onclick="showDetail('${o.orderId || o.id}')"
                  class="px-3 py-1 border border-stone-800 text-[9px] uppercase tracking-widest text-stone-500 hover:text-white hover:border-stone-600 transition-all whitespace-nowrap">
                  View
                </button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    function statusBadge(status) {
      const cls = status === 'Delivered' ? 'status-delivered' : status === 'Dispatched' ? 'status-dispatched' : 'status-placed';
      return `<span class="status-badge ${cls}">${status}</span>`;
    }

    // ── UPDATE STATUS ────────────────────────────────────────
    async function updateStatus(orderId, newStatus) {
      try {
        await db.collection('orders').doc(orderId).update({ status: newStatus });
        const idx = allOrders.findIndex(o => (o.orderId || o.id) === orderId);
        if (idx !== -1) allOrders[idx].status = newStatus;
        updateStats();
      } catch(e) {
        alert('Failed to update status. Please try again.');
        console.error(e);
      }
    }

    // ── FILTER ───────────────────────────────────────────────
    function filterOrders() {
      const q      = document.getElementById('search-input').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const filtered = allOrders.filter(o => {
        const matchStatus = !status || o.status === status;
        const matchQuery  = !q ||
          (o.name||'').toLowerCase().includes(q) ||
          (o.phone||'').includes(q) ||
          (o.orderId||'').toLowerCase().includes(q) ||
          (o.product||'').toLowerCase().includes(q);
        return matchStatus && matchQuery;
      });
      renderOrders(filtered);
    }

    // ── ORDER DETAIL ─────────────────────────────────────────
    function showDetail(orderId) {
      const o = allOrders.find(o => (o.orderId || o.id) === orderId);
      if (!o) return;
      document.getElementById('detail-order-id').textContent = o.orderId || o.id;
      const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('en-IN') : '—';
      document.getElementById('detail-content').innerHTML = `
        <div class="grid grid-cols-2 gap-6">
          <div><p class="text-[9px] uppercase tracking-widest text-stone-600 mb-1">Status</p>${statusBadge(o.status)}</div>
          <div><p class="text-[9px] uppercase tracking-widest text-stone-600 mb-1">Date</p><p class="text-stone-300">${date}</p></div>
        </div>
        <div class="border-t border-stone-900 pt-6">
          <p class="text-[9px] uppercase tracking-widest text-stone-600 mb-4">Customer</p>
          <div class="grid grid-cols-2 gap-4 text-stone-300">
            <div><p class="text-stone-600 text-xs mb-1">Name</p>${o.name}</div>
            <div><p class="text-stone-600 text-xs mb-1">Phone</p>${o.phone}</div>
            <div><p class="text-stone-600 text-xs mb-1">Email</p>${o.email}</div>
            <div><p class="text-stone-600 text-xs mb-1">Pincode</p>${o.pincode}</div>
          </div>
          <div class="mt-4"><p class="text-stone-600 text-xs mb-1">Address</p><p class="text-stone-300">${o.address}, ${o.city} - ${o.pincode}</p></div>
        </div>
        <div class="border-t border-stone-900 pt-6">
          <p class="text-[9px] uppercase tracking-widest text-stone-600 mb-4">Order</p>
          <div class="grid grid-cols-2 gap-4 text-stone-300">
            <div><p class="text-stone-600 text-xs mb-1">Product</p>${o.product}</div>
            <div><p class="text-stone-600 text-xs mb-1">Quantity</p>${o.quantity}</div>
          </div>
          ${o.notes ? `<div class="mt-4"><p class="text-stone-600 text-xs mb-1">Notes</p><p class="text-stone-300">${o.notes}</p></div>` : ''}
        </div>
        <div class="border-t border-stone-900 pt-6">
          <p class="text-[9px] uppercase tracking-widest text-stone-600 mb-4">Payment Screenshot</p>
          ${o.screenshotUrl
            ? `<a href="${o.screenshotUrl}" target="_blank"><img src="${o.screenshotUrl}" class="max-h-64 border border-stone-800 hover:opacity-80 transition-opacity cursor-pointer"></a>
               <a href="${o.screenshotUrl}" target="_blank" class="text-[9px] uppercase tracking-widest text-stone-500 hover:text-white transition-colors mt-3 block">Open Full Size ↗</a>`
            : `<p class="text-stone-600 text-xs">No screenshot uploaded.</p>`}
        </div>
        <div class="border-t border-stone-900 pt-6">
          <p class="text-[9px] uppercase tracking-widest text-stone-600 mb-3">Update Status</p>
          <div class="flex gap-3">
            ${['Order Placed','Dispatched','Delivered'].map(s => `
              <button onclick="updateStatus('${o.orderId||o.id}','${s}');closeDetail();loadOrders();"
                class="px-4 py-2 text-[9px] uppercase tracking-widest transition-all ${o.status===s ? 'bg-white text-black' : 'border border-stone-800 text-stone-400 hover:text-white hover:border-stone-600'}">
                ${s}
              </button>`).join('')}
          </div>
        </div>`;
      document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeDetail() {
      document.getElementById('detail-modal').style.display = 'none';
    }

    // Enter key on login
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) adminLogin();
    });
  </script>
</body>
</html>
